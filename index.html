<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c0f1a">
<title>협동 타워 디펜스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --sky1:#232c47; --sky2:#0a0d16;
  --gold:#e8b13d; --gold-dim:#b8802c;
  --crimson:#e0574a; --crimson-dim:#8f2e26;
  --teal:#4fc3d9;
  --parch:#ece3cf;
  --panel:rgba(16,20,32,.86);
  --panel-b:rgba(232,177,61,.35);
  --line:rgba(255,255,255,.12);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:var(--sky2);
  font-family:'Noto Sans KR',sans-serif;color:var(--parch);
  -webkit-user-select:none;user-select:none;touch-action:none;}
.disp{font-family:'Black Han Sans',sans-serif; letter-spacing:.5px;}
button{font-family:inherit;}
input{font-family:inherit;}

/* ---------- 공통 화면 레이어 ---------- */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% -10%, var(--sky1), var(--sky2) 70%);
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  z-index:20;}
.hidden{display:none !important;}

/* ---------- 로비 ---------- */
#lobbyScreen .wrap{width:min(420px,88vw);display:flex;flex-direction:column;align-items:center;gap:18px;}
.logo{font-size:34px;color:var(--gold);text-shadow:0 2px 0 #6b4413,0 0 22px rgba(232,177,61,.35);text-align:center;line-height:1.25;}
.logo small{display:block;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--parch);opacity:.7;font-weight:500;margin-top:4px;letter-spacing:0;}
.card{width:100%;background:var(--panel);border:1px solid var(--panel-b);border-radius:16px;padding:18px;
  box-shadow:0 8px 30px rgba(0,0,0,.4);}
.tabs{display:flex;width:100%;gap:8px;}
.tabBtn{flex:1;padding:12px 0;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.04);
  color:var(--parch);font-size:15px;font-weight:700;opacity:.6;}
.tabBtn.active{opacity:1;border-color:var(--gold);background:rgba(232,177,61,.12);color:var(--gold);}
.field{width:100%;margin-top:14px;}
.field label{display:block;font-size:12px;color:var(--parch);opacity:.65;margin-bottom:6px;}
.field input{width:100%;padding:13px 14px;border-radius:10px;border:1px solid var(--line);
  background:rgba(0,0,0,.35);color:var(--parch);font-size:17px;outline:none;}
.field input:focus{border-color:var(--gold);}
#joinCodeInput{text-transform:uppercase;letter-spacing:4px;text-align:center;font-weight:700;}
.btn{display:block;width:100%;padding:14px 0;border-radius:12px;border:none;font-size:16px;font-weight:700;
  margin-top:14px;cursor:pointer;}
.btn-gold{background:linear-gradient(180deg,#f0bd52,var(--gold-dim));color:#2a1a05;
  box-shadow:0 4px 0 #7a5416,0 6px 14px rgba(0,0,0,.35);}
.btn-gold:active{transform:translateY(2px);box-shadow:0 2px 0 #7a5416;}
.btn-gold:disabled{filter:grayscale(.6);opacity:.5;box-shadow:none;}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--parch);border:1px solid var(--line);}
.btn-ghost:active{background:rgba(255,255,255,.1);}
.btn-danger{background:rgba(224,87,74,.15);color:var(--crimson);border:1px solid var(--crimson-dim);}

/* 대기실 */
#waitPanel{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;}
.roomCodeBox{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.35);border:1px dashed var(--gold);
  border-radius:12px;padding:12px 18px;}
.roomCodeBox .code{font-size:26px;font-weight:900;letter-spacing:6px;color:var(--gold);font-family:'Black Han Sans',sans-serif;}
.iconBtn{width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.06);
  color:var(--parch);font-size:16px;display:flex;align-items:center;justify-content:center;}
.playerList{width:100%;display:flex;flex-direction:column;gap:8px;}
.pRow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.04);
  border:1px solid var(--line);font-size:14px;}
.pDot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pRow.me .pDot{background:var(--teal);}
.pRow.peer .pDot{background:var(--crimson);}
.pRow.empty{opacity:.45;}
.hint{font-size:12px;opacity:.55;text-align:center;line-height:1.5;}

/* ---------- 게임 화면 ---------- */
#gameScreen{position:fixed;inset:0;background:#000;z-index:10;}
#gameCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}

#hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:8px;
  padding:calc(env(safe-area-inset-top) + 8px) calc(env(safe-area-inset-right) + 8px) 8px calc(env(safe-area-inset-left) + 8px);
  z-index:15;pointer-events:none;}
.stat{pointer-events:auto;display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--panel-b);
  border-radius:10px;padding:6px 11px;font-size:14px;font-weight:700;}
.stat .ic{font-size:15px;}
.stat.gold{color:var(--gold);}
.stat.life{color:var(--crimson);}
.stat.wave{color:var(--teal);}
#hud .spacer{flex:1;}
#leaveBtn{pointer-events:auto;width:36px;height:36px;border-radius:9px;background:var(--panel);border:1px solid var(--panel-b);
  color:var(--parch);font-size:15px;}
#fsBtn{pointer-events:auto;width:36px;height:36px;border-radius:9px;background:var(--panel);border:1px solid var(--panel-b);
  color:var(--parch);font-size:15px;}
#speedBtn{pointer-events:auto;min-width:44px;height:36px;border-radius:9px;background:var(--panel);border:1px solid var(--panel-b);
  color:var(--teal);font-size:14px;font-weight:900;}
#speedBtn.fast{border-color:var(--teal);background:rgba(79,195,217,.16);box-shadow:0 0 10px rgba(79,195,217,.35);}
#muteBtn{pointer-events:auto;width:36px;height:36px;border-radius:9px;background:var(--panel);border:1px solid var(--panel-b);
  color:var(--parch);font-size:15px;}

#waveTimerWrap{pointer-events:auto;display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--panel-b);
  border-radius:10px;padding:6px 10px;font-size:13px;font-weight:700;color:var(--parch);}
#skipBtn{pointer-events:auto;background:rgba(232,177,61,.18);border:1px solid var(--gold);color:var(--gold);
  border-radius:8px;padding:5px 9px;font-size:12px;font-weight:700;}

#eventBanner{position:fixed;top:64px;left:50%;transform:translate(-50%,-8px);z-index:16;pointer-events:none;
  opacity:0;transition:opacity .25s, transform .25s;text-align:center;}
#eventBanner.show{opacity:1;transform:translate(-50%,0);}
#eventBanner .txt{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--gold);
  text-shadow:0 2px 10px rgba(0,0,0,.8),0 0 16px rgba(232,177,61,.4);white-space:nowrap;}
#eventBanner .sub{font-size:12px;color:var(--parch);opacity:.8;margin-top:2px;}

#toast{position:fixed;left:50%;bottom:118px;transform:translate(-50%,6px);z-index:16;background:rgba(0,0,0,.75);
  color:var(--parch);padding:8px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s,transform .2s;
  pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translate(-50%,0);}

#connBanner{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:17;background:rgba(224,87,74,.9);
  color:#fff;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;display:none;pointer-events:none;}

#towerBar{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:6px;
  padding:6px calc(env(safe-area-inset-right) + 6px) calc(env(safe-area-inset-bottom) + 8px) calc(env(safe-area-inset-left) + 6px);
  z-index:15;background:linear-gradient(to top,rgba(6,8,14,.85),rgba(6,8,14,0));pointer-events:none;
  overflow-x:auto;-webkit-overflow-scrolling:touch;}
#towerBar::-webkit-scrollbar{display:none;}
.towerBtn{pointer-events:auto;width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;
  background:var(--panel);border:1.5px solid var(--panel-b);border-radius:11px;padding:6px 3px 5px;}
.towerBtn .ic{width:22px;height:22px;}
.ic.shape-archer{border-radius:50%;}
.ic.shape-cannon{border-radius:5px;}
.ic.shape-frost{transform:rotate(45deg);border-radius:3px;width:17px;height:17px;margin:2px auto;}
.ic.shape-mage{border-radius:0;clip-path:polygon(50% 0%,0% 100%,100% 100%);}
.ic.shape-flame{border-radius:50% 50% 50% 0;transform:rotate(45deg);}
.ic.shape-bank{border-radius:3px;clip-path:polygon(50% 0%,100% 38%,100% 100%,0% 100%,0% 38%);}
.ic.shape-awaken{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
.ic.shape-fortress{border-radius:2px;clip-path:polygon(0% 22%,15% 22%,15% 0%,32% 0%,32% 22%,50% 22%,50% 0%,68% 0%,68% 22%,85% 22%,85% 0%,100% 0%,100% 100%,0% 100%);}
.towerBtn.edit{border-style:dashed;}
.towerBtn .rm{position:absolute;top:-6px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--crimson);
  color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;line-height:1;}
.towerBtn{position:relative;}
.towerBtn .nm{font-size:9.5px;font-weight:700;color:var(--parch);}
.towerBtn .cost{font-size:9.5px;font-weight:700;color:var(--gold);}
.towerBtn.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,177,61,.35),0 0 12px rgba(232,177,61,.35);
  background:rgba(232,177,61,.14);}
.towerBtn.poor{opacity:.4;}

/* 준비 페이즈 바 */
#prepBar{position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 54px);transform:translateX(-50%);z-index:16;
  display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--gold);border-radius:14px;
  padding:9px 14px;box-shadow:0 6px 20px rgba(0,0,0,.4);}
#prepBar.hidden{display:none;}
#prepInfo{font-size:14px;font-weight:700;color:var(--parch);}
#prepInfo #prepTimeTxt{color:var(--gold);font-family:'Black Han Sans',sans-serif;font-size:17px;margin-left:4px;}
#readyBtn{background:linear-gradient(180deg,#7fd06a,#3f8f34);color:#0b2a08;border:none;border-radius:10px;
  padding:9px 16px;font-size:14px;font-weight:900;box-shadow:0 3px 0 #2c6b22;}
#readyBtn.done{filter:grayscale(.4);opacity:.7;}
#loadoutBtn{background:rgba(79,195,217,.18);color:var(--teal);border:1px solid var(--teal);border-radius:10px;
  padding:9px 12px;font-size:13px;font-weight:900;}
#loadoutDrawer{position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 104px);transform:translateX(-50%);z-index:16;
  width:min(440px,94vw);background:var(--panel);border:1px solid var(--teal);border-radius:14px;padding:12px 12px 14px;
  box-shadow:0 8px 26px rgba(0,0,0,.55);}
#loadoutDrawer.hidden{display:none;}
#loadoutDrawer .lh{font-size:13px;font-weight:900;color:var(--teal);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
#loadoutDrawer .lh .lx{background:none;border:none;color:var(--parch);opacity:.7;font-size:16px;}
#loadoutDrawer .lgrid{display:flex;flex-wrap:wrap;gap:6px;}
.loBtn{width:60px;display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(255,255,255,.05);
  border:1.5px solid var(--line);border-radius:10px;padding:6px 3px 5px;position:relative;}
.loBtn .ic{width:20px;height:20px;}
.loBtn .nm{font-size:9px;font-weight:700;color:var(--parch);}
.loBtn.on{border-color:var(--teal);background:rgba(79,195,217,.16);}
.loBtn.on::after{content:'✓';position:absolute;top:-6px;right:-4px;width:16px;height:16px;border-radius:50%;
  background:var(--teal);color:#062229;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;}
#loadoutDrawer .lhint{font-size:10.5px;opacity:.6;margin-top:8px;line-height:1.4;}

/* 오른쪽 UP 패널 (일괄UP 토글 버튼만) */
#upPanel{position:fixed;right:calc(env(safe-area-inset-right) + 6px);top:50%;transform:translateY(-50%);z-index:15;
  display:flex;flex-direction:column;align-items:flex-end;gap:6px;pointer-events:none;}
#upPanel.hidden{display:none;}
.upToggle{pointer-events:auto;width:46px;height:42px;border-radius:11px;line-height:1.05;
  background:var(--panel);border:1.5px solid var(--gold);color:var(--gold);font-size:12px;font-weight:900;}
.upToggle.active{background:rgba(232,177,61,.28);box-shadow:0 0 12px rgba(232,177,61,.5);}

/* 화염 스킬 버튼 (미사용: 상태창 내부로 이동) */
#skillBtn{position:fixed;right:calc(env(safe-area-inset-right) + 10px);bottom:calc(env(safe-area-inset-bottom) + 100px);
  z-index:16;width:60px;height:60px;border-radius:50%;border:2px solid #ff8c32;
  background:radial-gradient(circle at 40% 35%, #ffb14a, #d2461a);color:#fff;font-size:24px;font-weight:900;
  box-shadow:0 4px 16px rgba(210,70,20,.6);display:flex;align-items:center;justify-content:center;}
#skillBtn.hidden{display:none;}
#skillBtn.cool{filter:grayscale(.7) brightness(.7);border-color:#777;}
#skillBtn #skillCdTxt{position:absolute;font-size:14px;font-family:'Black Han Sans',sans-serif;}

#infoPopup{position:fixed;left:calc(env(safe-area-inset-left) + 7px);bottom:calc(env(safe-area-inset-bottom) + 84px);
  z-index:16;background:var(--panel);border:1.5px solid var(--gold);border-radius:12px;padding:9px 10px;width:168px;
  box-shadow:0 8px 26px rgba(0,0,0,.55);}
#infoPopup.hidden{display:none;}
#infoPopup .ttl{font-size:12.5px;font-weight:900;color:var(--gold);display:flex;justify-content:space-between;align-items:center;}
#infoPopup .ttlLv{font-size:10px;color:var(--parch);opacity:.75;font-weight:700;margin-left:5px;margin-right:auto;}
#infoPopup .stats{margin:6px 0 8px;display:flex;flex-direction:column;gap:2px;}
#infoPopup .sr{display:flex;justify-content:space-between;font-size:10px;}
#infoPopup .sr span{opacity:.62;}
#infoPopup .sr b{color:var(--parch);font-weight:800;}
#infoPopup .row{display:flex;gap:5px;}
#infoPopup button{flex:1;padding:7px 2px;border-radius:7px;border:none;font-size:10.5px;font-weight:700;}
#infoPopup .up{background:var(--gold);color:#2a1a05;}
#infoPopup .up:disabled{opacity:.4;}
#infoPopup .sl{background:rgba(224,87,74,.18);color:var(--crimson);border:1px solid var(--crimson-dim) !important;}
#infoPopup .x{background:none;color:var(--parch);opacity:.6;font-size:14px;padding:0;flex:none;width:18px;}
#infoPopup .skillMini{flex:none;width:30px;height:23px;margin-right:3px;border:1.5px solid #ff8c32;border-radius:7px;
  background:radial-gradient(circle at 40% 35%,#ffb14a,#d2461a);color:#fff;font-size:12px;font-weight:900;
  display:flex;align-items:center;justify-content:center;gap:1px;position:relative;box-shadow:0 0 8px rgba(210,70,20,.5);}
#infoPopup .skillMini span{font-size:9px;}
#infoPopup .skillMini.cool{filter:grayscale(.6) brightness(.72);border-color:#888;box-shadow:none;}

#gameOverScreen h2{font-size:30px;color:var(--crimson);}
#gameOverScreen .waveReached{font-size:16px;margin:8px 0 20px;opacity:.85;}
#gameOverScreen .waveReached b{color:var(--gold);font-size:22px;}

#errBanner{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);max-width:88vw;z-index:30;
  background:rgba(224,87,74,.95);color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;display:none;text-align:center;}

.spin{width:22px;height:22px;border-radius:50%;border:3px solid rgba(255,255,255,.25);border-top-color:var(--gold);
  animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ---------- 세로모드 회전 안내 ---------- */
#rotateOverlay{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:var(--sky2);text-align:center;padding:20px;}
#rotateOverlay .ic{font-size:52px;display:inline-block;animation:rot 1.6s ease-in-out infinite;}
#rotateOverlay .t1{font-size:19px;color:var(--gold);margin-top:14px;}
#rotateOverlay .t2{font-size:12px;opacity:.6;margin-top:6px;}
@keyframes rot{0%,100%{transform:rotate(0deg);}50%{transform:rotate(-90deg);}}
@media (orientation: portrait){ #rotateOverlay{display:flex;} }
</style>
</head>
<body>

<!-- 로비 화면 -->
<div id="lobbyScreen" class="screen">
  <div class="wrap">
    <div class="logo">협동 타워 디펜스<small>친구와 함께 기지를 지켜라</small></div>

    <div class="card" id="menuCard">
      <div class="tabs">
        <button class="tabBtn active" id="tabHost">방 만들기</button>
        <button class="tabBtn" id="tabJoin">참가하기</button>
      </div>
      <div class="field">
        <label>내 닉네임</label>
        <input id="nickInput" maxlength="10" placeholder="닉네임 입력">
      </div>
      <div class="field hidden" id="joinField">
        <label>초대 코드</label>
        <input id="joinCodeInput" maxlength="4" placeholder="예: A3K9" autocapitalize="characters" autocomplete="off" spellcheck="false">
      </div>
      <button class="btn btn-gold" id="menuActionBtn">방 만들기</button>
      <div class="hint" style="margin-top:12px;">최대 4인 협동 · 링크 하나로 초대 · 별도 설치 없음</div>
    </div>

    <div class="card hidden" id="waitPanel">
      <div id="waitInner"></div>
    </div>
  </div>
</div>

<!-- 게임 화면 -->
<div id="gameScreen" class="screen hidden" style="padding:0;background:#000;display:block;">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="stat gold"><span class="ic">💰</span><span id="goldTxt">0</span></div>
    <div class="stat life"><span class="ic">❤️</span><span id="lifeTxt">0</span></div>
    <div class="stat wave"><span class="ic">🌊</span><span id="waveTxt">0</span></div>
    <div class="spacer"></div>
    <div id="waveTimerWrap"><span id="timerTxt">--</span><button id="skipBtn">즉시소환</button></div>
    <button id="speedBtn">1x</button>
    <button id="muteBtn">🔊</button>
    <button id="fsBtn">⛶</button>
    <button id="leaveBtn">✕</button>
  </div>

  <div id="connBanner">상대방 연결 끊김</div>
  <div id="eventBanner"><div class="txt" id="eventTxt"></div><div class="sub" id="eventSub"></div></div>
  <div id="infoPopup" class="hidden"></div>

  <!-- 준비 페이즈 안내 + 준비완료 버튼 -->
  <div id="prepBar" class="hidden">
    <div id="prepInfo">준비 시간 <span id="prepTimeTxt">5:00</span></div>
    <button id="loadoutBtn">유닛 편성</button>
    <button id="readyBtn">준비 완료</button>
  </div>

  <!-- 유닛 편성 드로어 (준비 페이즈 전용) -->
  <div id="loadoutDrawer" class="hidden"></div>

  <!-- 오른쪽 종류별 일괄 업그레이드(UP) 패널 -->
  <div id="upPanel"></div>

  <!-- 화염탑 스킬 버튼 (5렙 화염탑 보유 시 표시) -->
  <button id="skillBtn" class="hidden">🔥<span id="skillCdTxt"></span></button>

  <div id="towerBar"></div>
</div>

<!-- 게임오버 화면 -->
<div id="gameOverScreen" class="screen hidden">
  <div class="wrap">
    <h2 class="disp">기지 함락</h2>
    <div class="waveReached">도달 웨이브 <b id="finalWave">0</b></div>
    <button class="btn btn-gold" id="retryBtn">다시하기</button>
    <button class="btn btn-ghost" id="exitBtn" style="margin-top:10px;">나가기</button>
  </div>
</div>

// 치킨맵 참고: 계단식 잔꺾임 + 상단 왕복 + 하단 지그재그로 길고 구불구불하게.
const LANE_R1 = 150, LANE_R2 = 300, LANE_R3 = 450, LANE_R4 = 600, LANE_R5 = 760;
const PATH = [
  // 좌측 상단 스폰에서 출발해 오른쪽으로 향하며 계단식으로 오르내림 (짧게 축약)

];
PATH.reverse();   // 기지↔적스폰 위치 스왑: 이제 PATH[0]=우측(적 스폰), 마지막=좌측(팀 기지)
const SPAWN_X = PATH[0].x, SPAWN_Y = PATH[0].y;
const BASE_X = PATH[PATH.length-1].x, BASE_Y = PATH[PATH.length-1].y;
const LANE_Y = LANE_R3;   // 하위 호환용 참조 (일부에서 사용)

// 경로 총 길이 및 세그먼트 누적 길이
const PATH_SEGS = (function(){
  const segs=[]; let total=0;
  for(let i=0;i<PATH.length-1;i++){
    const a=PATH[i], b=PATH[i+1];
    const len=Math.hypot(b.x-a.x, b.y-a.y);
    segs.push({a,b,len,start:total, dirx:(b.x-a.x)/len, diry:(b.y-a.y)/len});
    total+=len;
  }
  return {segs, total};
})();
const PATH_TOTAL = PATH_SEGS.total;

// 경로 진행거리(dist)에 해당하는 좌표 반환
function pathPos(dist){
  const segs = PATH_SEGS.segs;
  if(dist<=0) return {x:PATH[0].x, y:PATH[0].y};
  if(dist>=PATH_TOTAL) return {x:BASE_X, y:BASE_Y};
  for(const s of segs){
    if(dist <= s.start+s.len){
      const d = dist - s.start;
      return {x:s.a.x + s.dirx*d, y:s.a.y + s.diry*d};
    }
  }
  return {x:BASE_X, y:BASE_Y};
}
// 임의 점(px,py)이 경로상 어느 진행거리(dist)에 대응하는지 (요새탑 위치 산출용)
function projectToPathDist(px,py){
  let best=Infinity, bestDist=0;
  for(const s of PATH_SEGS.segs){
    const vx=s.b.x-s.a.x, vy=s.b.y-s.a.y;
    const wx=px-s.a.x, wy=py-s.a.y;
    const t=Math.max(0, Math.min(1, (wx*vx+wy*vy)/(s.len*s.len)));
    const cx=s.a.x+vx*t, cy=s.a.y+vy*t;
    const d=Math.hypot(px-cx, py-cy);
    if(d<best){ best=d; bestDist=s.start + s.len*t; }
  }
  return bestDist;
}
// 임의 점(px,py)에서 경로까지 최단거리 (설치 금지 판정용)
function distToPath(px,py){
  let best=Infinity;
  for(const s of PATH_SEGS.segs){
    // 선분 a-b에 대한 점-선분 거리
    const vx=s.b.x-s.a.x, vy=s.b.y-s.a.y;
    const wx=px-s.a.x, wy=py-s.a.y;
    const t=Math.max(0, Math.min(1, (wx*vx+wy*vy)/(s.len*s.len)));
    const cx=s.a.x+vx*t, cy=s.a.y+vy*t;
    const d=Math.hypot(px-cx, py-cy);
    if(d<best) best=d;
  }
  return best;
}

// 설치 가능 여부: 경로 근처(LANE_NOBUILD)·기지/스폰 주변·맵 밖 제외
function isBuildableSpot(x,y){
  if(x < 60 || x > WORLD_W-60) return false;
  if(y < BUILD_MARGIN || y > WORLD_H-BUILD_MARGIN) return false;
  if(distToPath(x,y) < LANE_NOBUILD) return false;
  // 스폰/기지 포탈 주변 금지
  if(Math.hypot(x-SPAWN_X, y-SPAWN_Y) < BASE_MARGIN+20) return false;
  if(Math.hypot(x-BASE_X, y-BASE_Y) < BASE_MARGIN+20) return false;
  return true;
}

/* ---------------- 사운드 엔진 (Web Audio, 백엔드 무관) ---------------- */
const Snd = (function(){
  let ac = null, master = null, muted = false, bgmTimer = null, bgmOn = false;
  let bgmStep = 0;
  function ensure(){
    if(ac) return;
    try{
      ac = new (window.AudioContext||window.webkitAudioContext)();
      master = ac.createGain();
      master.gain.value = 0.5;
      master.connect(ac.destination);
    }catch(e){ ac=null; }
  }
  function resume(){ if(ac && ac.state==='suspended') ac.resume().catch(()=>{}); }
  // 기본 톤: 파형 + 주파수 엔벨로프 + 게인 엔벨로프
  function tone(opt){
    if(!ac || muted) return;
    const t0 = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = opt.type || 'sine';
    o.frequency.setValueAtTime(opt.f0, t0);
    if(opt.f1!=null) o.frequency.exponentialRampToValueAtTime(Math.max(1,opt.f1), t0+opt.dur);
    const peak = opt.gain!=null ? opt.gain : 0.3;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+opt.dur);
    o.connect(g); g.connect(opt.dest || master);
    o.start(t0); o.stop(t0+opt.dur+0.02);
  }
  // 짧은 노이즈 버스트 (타격/폭발감)
  function noise(dur, peak, filterHz){
    if(!ac || muted) return;
    const t0 = ac.currentTime;
    const n = Math.floor(ac.sampleRate*dur);
    const buf = ac.createBuffer(1, n, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i] = (Math.random()*2-1);
    const src = ac.createBufferSource(); src.buffer = buf;
    const g = ac.createGain();
    g.gain.setValueAtTime(peak, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    let node = src;
    if(filterHz){ const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=filterHz; src.connect(f); node=f; }
    node.connect(g); g.connect(master);
    src.start(t0); src.stop(t0+dur+0.01);
  }
  const sfx = {
    place(){ tone({type:'triangle', f0:330, f1:520, dur:0.12, gain:0.28}); tone({type:'sine', f0:660, f1:880, dur:0.1, gain:0.14}); },
    upgrade(){ tone({type:'triangle', f0:520, f1:780, dur:0.14, gain:0.26}); setTimeout(()=>tone({type:'sine', f0:900, f1:1200, dur:0.12, gain:0.18}),70); },
    sell(){ tone({type:'sine', f0:600, f1:240, dur:0.18, gain:0.22}); },
    // 타워 종류별 발사음
    fire(kind){
      if(kind==='cannon'){ noise(0.14, 0.3, 900); tone({type:'sine', f0:140, f1:60, dur:0.16, gain:0.25}); }
      else if(kind==='frost'){ tone({type:'sine', f0:1200, f1:700, dur:0.1, gain:0.14}); }
      else if(kind==='mage'){ tone({type:'sawtooth', f0:520, f1:1040, dur:0.12, gain:0.12}); }
      else { tone({type:'square', f0:880, f1:1320, dur:0.05, gain:0.08}); } // archer
    },
    kill(){ noise(0.1, 0.18, 1600); tone({type:'square', f0:200, f1:90, dur:0.12, gain:0.14}); },
    baseHit(){ tone({type:'sawtooth', f0:180, f1:70, dur:0.28, gain:0.34}); noise(0.16, 0.2, 500); },
    waveStart(){ tone({type:'sawtooth', f0:110, f1:220, dur:0.5, gain:0.28}); setTimeout(()=>tone({type:'square', f0:165, dur:0.3, gain:0.16}),120); },
    waveClear(){ [523,659,784,1047].forEach((f,i)=> setTimeout(()=>tone({type:'triangle', f0:f, dur:0.22, gain:0.24}), i*110)); },
    gameOver(){ [440,349,262,196].forEach((f,i)=> setTimeout(()=>tone({type:'sawtooth', f0:f, f1:f*0.6, dur:0.45, gain:0.3}), i*220)); }
  };
  // 은은한 초원 앰비언트 BGM (느린 아르페지오)
  const SCALE_NOTES = [261.63,329.63,392.0,523.25,392.0,329.63]; // C E G C' G E
  function bgmTick(){
    if(!ac || muted || !bgmOn) return;
    const f = SCALE_NOTES[bgmStep % SCALE_NOTES.length];
    tone({type:'sine', f0:f, dur:1.1, gain:0.05});
    if(bgmStep % 3===0) tone({type:'triangle', f0:f/2, dur:1.6, gain:0.04});
    bgmStep++;
  }
  return {
    unlock(){ ensure(); resume(); },
    play(name, arg){ ensure(); resume(); if(sfx[name]) sfx[name](arg); },
    startBgm(){ ensure(); resume(); if(bgmOn) return; bgmOn=true; bgmStep=0; clearInterval(bgmTimer); bgmTimer=setInterval(bgmTick, 560); },
    stopBgm(){ bgmOn=false; clearInterval(bgmTimer); },
    setMuted(m){ muted=m; if(master) master.gain.value = m?0:0.5; if(m) this.stopBgm(); },
    isMuted(){ return muted; }
  };
})();

/* ---------------- 유틸 ---------------- */
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function genCode(){
  let s=''; for(let i=0;i<4;i++) s += CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)];
  return s;
}
function copyText(t){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).catch(()=>{});
  } else {
    const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
  }
}
let toastTimer=null;
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 1800);
}
function showErr(msg){
  errBanner.textContent = msg;
  errBanner.style.display='block';
  clearTimeout(showErr._t);
  showErr._t = setTimeout(()=>{ errBanner.style.display='none'; }, 4200);
}
function errText(reason){
  if(reason==='gold') return '골드가 부족합니다';
  if(reason==='zone') return '이곳에는 설치할 수 없습니다';
  if(reason==='gap') return '다른 타워와 너무 가깝습니다';
  if(reason==='level') return '이미 최대 레벨입니다';
  if(reason==='max') return '최대 '+MAX_TOWERS+'개까지만 설치할 수 있습니다';
  if(reason==='cd') return '스킬 재사용 대기 중입니다';
  return '처리할 수 없습니다';
}

/* ---------------- 네트워킹 (Trystero) ---------------- */
async function loadTrystero(){
  let lastErr=null;
  for(const url of CDN_LIST){
    try{
      const m = await import(/* @vite-ignore */ url);
      if(m && typeof m.joinRoom==='function') return m;
    }catch(e){ lastErr=e; }
  }
  throw lastErr || new Error('네트워크 모듈을 불러오지 못했습니다');
}
function mkAction(r, name){
  const a = r.makeAction(name);
  if(Array.isArray(a)) return a;
  return [a.send || a[0], a.onMessage || a.get || a[1]];
}
function setupActions(){
  act.lobby = mkAction(room,'lobby');     // 게스트→호스트: 참가 알림 {pid,name}
  act.roster= mkAction(room,'roster');    // 호스트→전체: 참가자 명단 브로드캐스트
  act.start = mkAction(room,'start');
  act.sync  = mkAction(room,'sync');
  act.input = mkAction(room,'input');      // 게스트→호스트: {from,pid,...action}
  act.inres = mkAction(room,'inres');      // 호스트→전체: {to,id,ok,reason}
  act.leave = mkAction(room,'leave');      // 게스트→호스트: {pid}

  act.lobby[1]((data)=>{
    if(!isHost || !data || !data.pid) return;
    // 정원 초과 시 무시 (방장 포함 MAX_PLAYERS)
    if(!peers[data.pid] && (1+Object.keys(peers).length) >= MAX_PLAYERS){ return; }
    peers[data.pid] = {name: (data.name||'플레이어')};
    rebuildRoster();
    broadcastRoster();
    if(currentScreen==='lobby') renderWaitPanel();
  });
  act.roster[1]((data)=>{
    if(isHost) return;
    roster = (data && Array.isArray(data.list)) ? data.list : roster;
    if(currentScreen==='lobby') renderWaitPanel();
  });
  act.start[1]((data)=>{ onNetStart(data); });
  act.sync[1]((data)=>{ onNetSync(data); });
  act.input[1]((data)=>{
    if(isHost){
      const pid = data && data.from ? data.from : 'guest';
      const res = applyInput(data, pid);
      act.inres[0]({to:pid, id:data.id, ok:res.ok, reason:res.reason});
    }
  });
  act.inres[1]((data)=>{
    if(isHost) return;
    if(data.to && data.to!==myPid) return;   // 나에게 온 응답만 처리
    delete pendingActions[data.id];
    delete ghosts[data.id];
    if(!data.ok) toast(errText(data.reason));
  });
  act.leave[1]((data)=>{
    if(isHost && data && data.pid){ delete peers[data.pid]; rebuildRoster(); broadcastRoster(); }
    onPeerGone();
  });

  if(typeof room.onPeerJoin==='function'){
    room.onPeerJoin((pid)=>{
      hideConnBanner();
      // 게스트: 방장에게 내 참가 정보 전송 / 방장: 명단 재전송
      if(!isHost){ act.lobby[0]({pid:myPid, name:myName}); }
      else { broadcastRoster(); }
      if(currentScreen==='lobby') renderWaitPanel();
    });
  }
  if(typeof room.onPeerLeave==='function'){
    room.onPeerLeave((_pid)=>{
      // Trystero peerId와 우리 pid 매핑이 없으므로, 명단 정합은 leave 액션으로 처리.
      if(currentScreen==='game') showConnBanner();
      if(currentScreen==='lobby') renderWaitPanel();
    });
  }
}
// 호스트: peers로 roster 재구성 (방장 먼저)
function rebuildRoster(){
  roster = [{pid:'host', name:myName, host:true}];
  for(const pid of Object.keys(peers)) roster.push({pid, name:peers[pid].name, host:false});
}
function broadcastRoster(){ if(isHost && act.roster) act.roster[0]({list:roster}); }
function onPeerGone(){
  if(currentScreen==='game') showConnBanner();
  if(currentScreen==='lobby') renderWaitPanel();
}
async function connectRoom(code, asHost){
  isHost = asHost;
  myPid = asHost ? 'host' : ('p'+Math.random().toString(36).slice(2,9));
  roomCode = code;
  peers = {};
  roster = asHost ? [{pid:'host', name:myName, host:true}] : [];
  if(!netMod) netMod = await loadTrystero();
  room = netMod.joinRoom({appId:APP_ID, relayUrls:TRY_RELAYS, relayRedundancy:TRY_RELAYS.length}, 'TD-'+code);
  setupActions();
}
function leaveRoom(){
  try{ if(room && act.leave && !isHost) act.leave[0]({pid:myPid}); }catch(e){}
  try{ if(room && typeof room.leave==='function') room.leave(); }catch(e){}
  room = null; peers = {}; roster = []; sim = null; guestState = null;
  Snd.stopBgm();
}
function submitAction(action){
  if(isHost){
    const res = applyInput(action, 'host');
    if(!res.ok) toast(errText(res.reason));
  } else {
    action.id = 'i'+(inputSeq++);
    action.from = myPid;
    if(action.type==='place') addGhost(action.id, action.x, action.y, action.towerType);
    pendingActions[action.id] = action;
    if(act.input) act.input[0](action);
  }
}

/* ---------------- 시뮬레이션 (호스트 권위) ---------------- */
function newSim(players){
  const pids = (players && players.length) ? players.slice() : ['host'];
  const golds = {}; const ready = {};
  for(const pid of pids){ golds[pid] = 150; ready[pid] = false; }
  return {
    players: pids,                // 참가 플레이어 pid 목록 (게임 시작 시점 고정)
    golds, ready,                 // pid별 골드 풀 / 준비 상태
    lives:20, wave:0,
    phase:'prep',                 // 'prep'(로비 준비) → 'battle'
    prepTimer:LOBBY_PREP_TIME,    // 5분 준비 카운트다운
    waveActive:false, waveTimer:FIRST_PREP,
    spawnQueue:[], spawnTimer:0, spawnInterval:0.9,
    enemies:[], towers:[], projectiles:[],
    nextEnemyId:1, nextTowerId:1, nextProjId:1,
    fireZones:[],                 // 활성 불바다 [{until, tickAcc}]
    flameSkillT:0,                // 화염탑 스킬 활성 남은 시간(초) — 기본공격 강화 지속
    fireTrails:[],                // 불타는 적이 남긴 불길 [{x,y,until,tickAcc}]
    walls:[], nextWallId:1,       // 요새탑 스킬로 생성된 벽 [{id,x,y,dist,hp,maxHp,life,owner}]
    loadout: loadout.slice(),     // 팀 유닛 편성 (준비 페이즈에 변경 가능)
    gameOver:false, pendingEvents:[],
    sfxFire:{}, sfxKill:0, sfxBaseHit:0   // 동기화 구간 누적 (게스트 사운드용)
  };
}
// pid별 골드 접근 헬퍼 (호스트 시뮬레이션 내부용)
function simGold(pid){ return sim.golds[pid] || 0; }
function addGold(pid, amt){ if(sim.golds[pid]==null) sim.golds[pid]=0; sim.golds[pid] += amt; }
function addGoldBoth(amt){ for(const pid of sim.players) sim.golds[pid] += amt; }   // 전원에게 지급
// 킬 골드: 웨이브가 오를수록 획득량 증가 (기본골드 × 웨이브 배수)
function killGold(type){
  const g = ENEMY_TYPES[type].gold;
  const mult = 1 + (sim.wave-1)*0.12 + waveTier(sim.wave)*0.5;   // 웨이브·구간 비례 증가
  return Math.round(g * mult);
}
function pushEvent(evt){ sim.pendingEvents.push(evt); showBanner(evt); }

function genWaveList(n){
  const list = [];
  const count = 6 + Math.floor(n*1.6);
  for(let i=0;i<count;i++){
    let type='normal';
    const r = Math.random();
    // 웨이브가 오를수록 위협적인 유형 등장 확률 증가
    if(n>=15 && r<0.08) type='armored';
    else if(n>=12 && r<0.16) type='healer';
    else if(n>=6 && r<0.24) type='tank';
    else if(n>=8 && r<0.36) type='runner';
    else if(n>=5 && r<0.50) type='swarm';
    else if(n>=3 && r<0.70) type='fast';
    list.push(type);
  }
  // 5웨이브마다 탱크 보강
  if(n%5===0){ const extra=Math.floor(n/5); for(let i=0;i<extra;i++) list.push('tank'); }
  // 10웨이브마다 보스(brute) 등장 (넘어갈수록 여러 마리)
  if(n%10===0){ const bosses=Math.floor(n/10); for(let i=0;i<bosses;i++) list.push('brute'); }
  return list;
}
// 10웨이브 계단식 배율: 10웨이브 넘길 때마다 체력이 크게 뛴다
function waveTier(n){ return Math.floor((n-1)/10); }        // 0(1~10), 1(11~20), 2(21~30)...
function hpScale(n){
  const tier = waveTier(n);
  const within = 1 + ((n-1)%10)*0.06;   // 같은 구간 내 완만 증가 (최대 +54%)
  const step = Math.pow(2.4, tier);      // 구간마다 큰 계단 (2.4배씩)
  return within * step;
}
function spdScale(n){
  return 1 + Math.min((n-1)*0.008, 0.30) + waveTier(n)*0.06; // 구간마다 약간 더 빠르게
}
function startWave(){
  sim.wave++;
  sim.spawnQueue = genWaveList(sim.wave);
  sim.spawnInterval = Math.max(0.95 - sim.wave*0.018, 0.28);
  sim.spawnTimer = 0;
  sim.waveActive = true;
  const boss = sim.wave%10===0;
  pushEvent({t:'waveStart', wave:sim.wave, count:sim.spawnQueue.length, boss});
}
function spawnEnemy(type){
  const def = ENEMY_TYPES[type];
  const scale = hpScale(sim.wave);
  const hp = Math.round(def.hp*scale);
  sim.enemies.push({
    id: sim.nextEnemyId++, type,
    dist: 0, px: SPAWN_X, py: SPAWN_Y, x: SPAWN_X,   // x는 하위호환용(=px)
    hp, maxHp: hp,
    speed: def.speed*spdScale(sim.wave),
    dmg: def.dmg, armor: def.armor||0, heal: def.heal||0, healR: def.healR||0,
    healAcc:0, slowT:0, slowFactor:1,
    burnT:0, burnAcc:0, burnDmg:0, blue:false,   // 화염 도트 상태
    flameHits:0, trailAcc:0                        // 화염탑 명중 누적 / 불길 생성 누적
  });
}
function towerStat(type, level, key){
  const def = TOWER_TYPES[type];
  const base = def[key];
  if(base===undefined) return 0;
  if(def.infinite){
    // 각성자: 레벨 오를수록 증가폭이 조금씩 줄지만(효율 체감) 절대치는 무한히 상승
    if(key==='dmg'){
      let d = base*(1 + 0.55*Math.log(level));   // 로그 성장
      const bl = def.waveBonusLevel||Infinity;
      if(level >= bl) d *= (1 + (level - bl + 1)*0.01);  // 20렙부터 1렙당 +1%
      return d;
    }
    if(key==='range') return base*(1 + (level-1)*0.04);       // 레벨마다 +4% 사거리
    if(key==='rate') return base*Math.max(0.2, 1 - (level-1)*0.05); // 레벨마다 공속 5%↑ (하한 0.2)
    return base;
  }
  if(key==='dmg' || key==='range') return base*(1+(level-1)*0.32);
  if(key==='rate') return base*(1-(level-1)*0.12);
  return base;
}
function upgradeCost(type, level){
  const def = TOWER_TYPES[type];
  if(def.infinite) return Math.round(def.cost*(0.6 + 0.42*level)); // 레벨 비례 무한 증가
  return Math.round(def.cost*(0.72+0.5*level));
}
function sellRefund(tower){
  const inv = (tower.invested!=null) ? tower.invested : TOWER_TYPES[tower.type].cost;
  return Math.round(inv*0.6);
}
function applyInput(action, owner){
  if(!sim) return {ok:false, reason:'none'};
  if(action.type==='place'){
    const def = TOWER_TYPES[action.towerType];
    if(!def) return {ok:false, reason:'none'};
    if(!loadout.includes(action.towerType)) return {ok:false, reason:'none'};
    if(sim.towers.length >= MAX_TOWERS) return {ok:false, reason:'max'};
    const x = action.x, y = action.y;
    if(typeof x!=='number' || typeof y!=='number') return {ok:false, reason:'none'};
    if(!isBuildableSpot(x,y)) return {ok:false, reason:'zone'};
    if(sim.towers.some(t=>{ const dx=t.x-x, dy=t.y-y; return dx*dx+dy*dy < MIN_TOWER_GAP*MIN_TOWER_GAP; })) return {ok:false, reason:'gap'};
    if(simGold(owner) < def.cost) return {ok:false, reason:'gold'};
    addGold(owner, -def.cost);
    const tw = {id:sim.nextTowerId++, x, y, type:action.towerType, level:1, cd:0, owner, invested:def.cost, skillCd:0, lastUpWave:sim.wave};
    if(action.towerType==='fortress') tw.stored = 0;   // 요새탑: 스킬용 누적 피해량
    sim.towers.push(tw);
    return {ok:true};
  }
  if(action.type==='loadout'){
    // 준비 페이즈에만 편성 변경 허용 (팀 공유)
    if(sim.phase!=='prep') return {ok:false, reason:'none'};
    const list = Array.isArray(action.list) ? action.list.filter(x=>TOWER_TYPES[x]) : null;
    if(!list || !list.length || list.length>LOADOUT_MAX) return {ok:false, reason:'none'};
    sim.loadout = list.slice();
    applyLoadout(sim.loadout);
    return {ok:true};
  }
  if(action.type==='upgrade'){
    const t = sim.towers.find(t=>t.id===action.towerId);
    if(!t) return {ok:false, reason:'none'};
    const inf = TOWER_TYPES[t.type].infinite;
    if(!inf && t.level>=MAX_LEVEL) return {ok:false, reason:'level'};   // 각성자는 상한 없음
    const cost = upgradeCost(t.type, t.level);
    if(simGold(owner)<cost) return {ok:false, reason:'gold'};
    addGold(owner, -cost); t.level++; t.invested = (t.invested||TOWER_TYPES[t.type].cost)+cost;
    t.lastUpWave = sim.wave;   // 강등 타이머 리셋
    return {ok:true};
  }
  if(action.type==='bulkUp'){
    // 종류별 일괄 업그레이드: (각성자는 무한, 나머지는 최대레벨 미만인) 해당 종류 타워를 전부 +1
    const kind = action.towerType;
    const inf = TOWER_TYPES[kind].infinite;
    const targets = sim.towers.filter(t=>t.type===kind && (inf || t.level<MAX_LEVEL));
    if(!targets.length) return {ok:false, reason:'level'};
    let upped=0;
    for(const t of targets){
      const cost = upgradeCost(t.type, t.level);
      if(simGold(owner)<cost) break;
      addGold(owner, -cost); t.level++; t.invested = (t.invested||TOWER_TYPES[t.type].cost)+cost; t.lastUpWave = sim.wave; upped++;
    }
    if(upped===0) return {ok:false, reason:'gold'};
    return {ok:true};
  }
  if(action.type==='skill'){
    const t = sim.towers.find(t=>t.id===action.towerId);
    if(!t) return {ok:false, reason:'none'};
    // 화염탑 5렙 스킬 → 화염 강화 모드
    if(t.type==='flame'){
      if(t.level<MAX_LEVEL) return {ok:false, reason:'none'};
      if(t.skillCd>0) return {ok:false, reason:'cd'};
      const def = TOWER_TYPES.flame;
      t.skillCd = def.skillCd;
      sim.flameSkillT = def.skillDur;   // 30초간 화염탑 기본공격 강화 모드
      pushEvent({t:'skill'});
      return {ok:true};
    }
    // 각성자 5렙 스킬 → 에너지파 발사
    if(t.type==='awaken'){
      const def = TOWER_TYPES.awaken;
      if(t.level < def.skillLevel) return {ok:false, reason:'none'};
      if(t.skillCd>0) return {ok:false, reason:'cd'};
      t.skillCd = def.skillCd;
      fireEnergyWave(t, def.waveDmgMult);
      // 10렙 이상: 레벨을 10으로 초기화하는 대신 100×(레벨-10)만큼 사거리 내 적에게 피해
      if(t.level >= def.waveLevel){
        const burst = 100 * (t.level - def.waveLevel);
        if(burst > 0){
          const range = towerStat('awaken', t.level, 'range');
          for(const e of sim.enemies){
            const dx=e.px-t.x, dy=e.py-t.y;
            if(dx*dx+dy*dy <= range*range) e.hp -= burst;
          }
        }
        t.level = def.waveLevel;   // 레벨 10으로 초기화
        t.lastUpWave = sim.wave;   // 강등 타이머 갱신
      }
      pushEvent({t:'wave'});
      return {ok:true};
    }
    // 요새탑 스킬 → 누적 피해량만큼 체력의 벽을 길 위에 생성
    if(t.type==='fortress'){
      const def = TOWER_TYPES.fortress;
      if(t.skillCd>0) return {ok:false, reason:'cd'};
      const hp = Math.floor(t.stored||0);
      if(hp < 1) return {ok:false, reason:'none'};
      // 벽 위치: 요새탑 사거리 안에서 가장 앞선 적의 경로 지점, 없으면 요새탑에서 가장 가까운 경로 지점
      let wallDist = null, best=-1;
      const range = towerStat('fortress', t.level, 'range');
      for(const e of sim.enemies){
        const dx=e.px-t.x, dy=e.py-t.y;
        if(dx*dx+dy*dy <= range*range && e.dist>best){ best=e.dist; wallDist=e.dist; }
      }
      if(wallDist==null) wallDist = projectToPathDist(t.x, t.y);
      const p = pathPos(wallDist);
      t.skillCd = def.skillCd;
      t.stored = 0;   // 누적 소모
      sim.walls.push({id:sim.nextWallId++, x:p.x, y:p.y, dist:wallDist, hp:hp, maxHp:hp, life:def.wallLife, owner:t.owner});
      pushEvent({t:'wallUp', hp});
      return {ok:true};
    }
    return {ok:false, reason:'none'};
  }
  if(action.type==='ready'){
    if(sim.phase!=='prep') return {ok:false, reason:'none'};
    sim.ready[owner] = true;
    return {ok:true};
  }
  if(action.type==='sell'){
    const idx = sim.towers.findIndex(t=>t.id===action.towerId);
    if(idx<0) return {ok:false, reason:'none'};
    const tw = sim.towers[idx];
    addGold(tw.owner||'host', sellRefund(tw));   // 환급은 설치자에게
    sim.towers.splice(idx,1);
    return {ok:true};
  }
  if(action.type==='skip'){
    if(sim.phase==='battle' && !sim.waveActive) sim.waveTimer = 0;
    return {ok:true};
  }
  if(action.type==='speed'){
    const v = action.value;
    if(v===1||v===2||v===3||v===5){ gameSpeed = v; return {ok:true}; }
    return {ok:false, reason:'none'};
  }
  return {ok:false, reason:'none'};
}
function findTarget(tower){
  const range = towerStat(tower.type, tower.level, 'range');
  let best=null, bestDist=-1;
  for(const e of sim.enemies){
    const dx=e.px-tower.x, dy=e.py-tower.y;
    if(dx*dx+dy*dy <= range*range && e.dist>bestDist){ bestDist=e.dist; best=e; }
  }
  return best;
}
function fireTower(tower, target){
  const def = TOWER_TYPES[tower.type];
  // 각성자 10렙 이상: 기본공격이 에너지파로 대체
  if(tower.type==='awaken' && tower.level >= def.waveLevel){
    fireEnergyWave(tower, 1);
    sim.sfxFire[tower.type] = (sim.sfxFire[tower.type]||0) + 1;
    if(soundReady && sfxBudget.fire < 4){ sfxBudget.fire++; Snd.play('fire', tower.type); }
    return;
  }
  sim.projectiles.push({
    id: sim.nextProjId++, x:tower.x, y:tower.y, targetId:target.id,
    speed: def.speed, dmg: towerStat(tower.type,tower.level,'dmg'),
    splash: def.splash||0, slow: def.slow||0, slowDur: def.slowDur||0,
    type: def.proj,
    flameSkill: (tower.type==='flame' && sim.flameSkillT>0),  // 스킬 활성 중 발사한 화염탑 탄
    srcId: (tower.type==='fortress' ? tower.id : 0)           // 요새탑: 명중 시 피해를 누적할 타워
  });
  sim.sfxFire[tower.type] = (sim.sfxFire[tower.type]||0) + 1;
  if(soundReady && sfxBudget.fire < 4){ sfxBudget.fire++; Snd.play('fire', tower.type); }
}
// 각성자 에너지파: 사거리 내 가장 진행한 적 방향으로 관통하는 파동 발사
function fireEnergyWave(tower, dmgMult){
  const def = TOWER_TYPES.awaken;
  const range = towerStat('awaken', tower.level, 'range') * 1.3;
  // 방향: 사거리 내 가장 앞선 적을 향해, 없으면 기지 방향(왼쪽)
  let tx=-1, ty=0, best=-1;
  for(const e of sim.enemies){
    const dx=e.px-tower.x, dy=e.py-tower.y;
    if(dx*dx+dy*dy <= range*range && e.dist>best){ best=e.dist; tx=dx; ty=dy; }
  }
  const len = Math.hypot(tx,ty)||1;
  const dmg = towerStat('awaken', tower.level, 'dmg') * def.waveDmgMult * (dmgMult||1);
  sim.projectiles.push({
    id: sim.nextProjId++, x:tower.x, y:tower.y,
    dirx:tx/len, diry:ty/len, speed:520, dmg:dmg,
    type:'wave', wave:true, width:def.waveWidth,
    life:range/520 + 0.15, hitIds:{}   // 관통: 이미 맞은 적 재타격 방지
  });
}
function applyHit(proj, target){
  let base = proj.dmg;
  // 화염탑 스킬: 같은 적을 7회 이상 때리면 파란불 → 피해 배수
  if(proj.flameSkill){
    target.flameHits = (target.flameHits||0) + 1;
    if(target.flameHits >= TOWER_TYPES.flame.blueHits) target.blue = true;
    if(target.blue) base *= TOWER_TYPES.flame.blueMult;
  }
  const dmg = Math.max(1, base - (target.armor||0));   // 장갑: 정면 피해 경감(최소 1)
  target.hp -= dmg;
  // 요새탑: 실제로 입힌 피해를 스킬용 체력으로 누적
  if(proj.srcId){
    const src = sim.towers.find(t=>t.id===proj.srcId);
    if(src) src.stored = (src.stored||0) + dmg;
  }
  // 화염탑 스킬: 명중 시 적을 불태움(도트). 파란불이면 도트도 강화.
  if(proj.flameSkill){
    const fd = TOWER_TYPES.flame;
    target.burnT = fd.burnDur;
    target.burnAcc = target.burnAcc||0;
    target.burnDmg = fd.burnDmg * (target.blue ? fd.blueMult : 1);
  }
  if(proj.slow){
    target.slowFactor = Math.min(target.slowFactor, 1-proj.slow);
    target.slowT = Math.max(target.slowT, proj.slowDur);
  }
  if(proj.splash>0){
    for(const e of sim.enemies){
      if(e.id===target.id) continue;
      const dx=e.px-target.px, dy=e.py-target.py;
      if(dx*dx+dy*dy <= proj.splash*proj.splash){
        const sd = Math.max(1, proj.dmg*0.55 - (e.armor||0));
        e.hp -= sd;
      }
    }
  }
}
function hostTick(dt){
  if(!sim || sim.gameOver) return;

  // ---- 준비 페이즈: 적 없음, 둘 다 준비 완료거나 5분 경과 시 전투 시작 ----
  if(sim.phase==='prep'){
    sim.prepTimer -= dt;
    const allReady = sim.players.every(pid => sim.ready[pid]);
    if(allReady || sim.prepTimer<=0){
      sim.phase = 'battle';
      sim.waveTimer = FIRST_PREP;
      pushEvent({t:'battleStart'});
    }
    return; // 준비 중에는 아래 전투 로직을 돌리지 않음
  }

  if(!sim.waveActive){
    sim.waveTimer -= dt;
    if(sim.waveTimer<=0) startWave();
  } else if(sim.spawnQueue.length){
    sim.spawnTimer -= dt;
    if(sim.spawnTimer<=0){ spawnEnemy(sim.spawnQueue.shift()); sim.spawnTimer = sim.spawnInterval; }
  }

  for(const e of sim.enemies){
    let spd = e.speed;
    if(e.slowT>0){ spd *= e.slowFactor; e.slowT -= dt; if(e.slowT<=0) e.slowFactor=1; }
    e.dist += spd*dt;
    const p = pathPos(e.dist);
    e.px = p.x; e.py = p.y; e.x = p.x;   // x는 하위호환
    if(e.dist >= PATH_TOTAL){ sim.lives -= e.dmg; e.dead=true; sim.sfxBaseHit++; if(soundReady) Snd.play('baseHit'); }
  }

  // ---- 요새탑 벽: 길 위에서 적을 막음. 닿으면 그 적 체력만큼 벽 체력이 깎이고 적은 소멸(흡수) ----
  if(sim.walls.length){
    const fwd = TOWER_TYPES.fortress;
    const r2 = fwd.wallR*fwd.wallR;
    for(const w of sim.walls){
      w.life -= dt;
      if(w.hp<=0 || w.life<=0) continue;
      for(const e of sim.enemies){
        if(e.dead || w.hp<=0) continue;
        const dx=e.px-w.x, dy=e.py-w.y;
        if(dx*dx+dy*dy > r2) continue;
        // 벽이 남은 체력으로 적을 막음
        if(w.hp >= e.hp){
          w.hp -= e.hp;               // 적 체력만큼 벽 소모
          addGoldBoth(killGold(e.type));  // 흡수한 적도 처치로 간주 → 보상
          e.hp = 0; e.dead = true;    // 적 소멸
          sim.sfxKill++;
        } else {
          // 벽 체력이 부족하면: 남은 체력만큼 적에게 피해 주고 벽은 파괴
          e.hp -= w.hp;
          w.hp = 0;
          // 벽 지점 직전에서 잠깐 막힘 → 자연스럽게 통과
          if(e.dist > w.dist){ e.dist = w.dist; const p=pathPos(e.dist); e.px=p.x; e.py=p.y; e.x=p.x; }
        }
      }
    }
    sim.walls = sim.walls.filter(w=>w.hp>0 && w.life>0);
  }

  // ---- 치유형 적: 주변 적을 초당 heal 만큼 회복 (최대체력 한도) ----
  for(const h of sim.enemies){
    if(!h.heal) continue;
    h.healAcc += dt;
    if(h.healAcc >= 0.5){   // 0.5초마다 heal/2씩
      h.healAcc -= 0.5;
      for(const e of sim.enemies){
        if(e.id===h.id) continue;
        const dx=e.px-h.px, dy=e.py-h.py;
        if(dx*dx+dy*dy <= (h.healR||0)*(h.healR||0)){ e.hp = Math.min(e.maxHp, e.hp + h.heal*0.5); }
      }
    }
  }

  // ---- 화염탑 스킬(30초): 기본공격 강화 지속시간 감소 ----
  if(sim.flameSkillT>0) sim.flameSkillT = Math.max(0, sim.flameSkillT - dt);

  // ---- 불타는 적: 도트 피해 + 지나간 자리에 불길 남김 ----
  const fd = TOWER_TYPES.flame;
  for(const e of sim.enemies){
    if(e.burnT>0){
      e.burnT -= dt;
      e.burnAcc += dt;
      while(e.burnAcc >= fd.burnTick){
        e.burnAcc -= fd.burnTick;
        e.hp -= (e.burnDmg||fd.burnDmg);
      }
      // 이동하며 불길 흔적 생성
      e.trailAcc += dt;
      if(e.trailAcc >= 0.12){
        e.trailAcc = 0;
        sim.fireTrails.push({x:e.px, y:e.py, until:fd.trailDur, tickAcc:0, blue:!!e.blue});
      }
      if(e.burnT<=0){ e.burnT=0; e.blue=false; e.flameHits=0; }
    }
  }

  // ---- 불길 트레일: 반경 내 적에게 도트, 시간 경과로 소멸 ----
  if(sim.fireTrails.length){
    for(const ft of sim.fireTrails){
      ft.until -= dt; ft.tickAcc += dt;
      while(ft.tickAcc >= fd.trailTick){
        ft.tickAcc -= fd.trailTick;
        const td = fd.trailDmg * (ft.blue ? fd.blueMult : 1);
        for(const e of sim.enemies){
          const dx=e.px-ft.x, dy=e.py-ft.y;
          if(dx*dx+dy*dy <= fd.trailR*fd.trailR) e.hp -= td;
        }
      }
    }
    if(sim.fireTrails.length>240) sim.fireTrails.splice(0, sim.fireTrails.length-240);
    sim.fireTrails = sim.fireTrails.filter(ft=>ft.until>0);
  }

  sim.enemies = sim.enemies.filter(e=>{
    if(e.dead) return false;
    if(e.hp<=0){ addGoldBoth(killGold(e.type)); sim.sfxKill++; if(soundReady && sfxBudget.kill < 4){ sfxBudget.kill++; Snd.play('kill'); } return false; }
    return true;
  });

  if(sim.lives<=0 && !sim.gameOver){
    sim.lives = 0; sim.gameOver = true;
    pushEvent({t:'gameOver', wave:sim.wave});
  }

  for(const t of sim.towers){
    if(t.skillCd>0) t.skillCd = Math.max(0, t.skillCd-dt);
    if(t.type==='bank') continue;   // 은행탑은 발사 안 함
    t.cd -= dt;
    if(t.cd<=0){
      const target = findTarget(t);
      if(target){
        fireTower(t, target);
        let rate = towerStat(t.type,t.level,'rate');
        // 궁수: 같은 적을 연속으로 때리면 공격당 공속 1%씩 상승(최대 -80%). 대상 바뀌면 초기화.
        if(t.type==='archer'){
          if(t.lastTargetId===target.id) t.atkStack = Math.min((t.atkStack||0)+1, 80);
          else t.atkStack = 0;
          t.lastTargetId = target.id;
          rate *= (1 - t.atkStack*0.01);
        }
        t.cd = rate;
      }
    }
  }

  for(const p of sim.projectiles){
    if(p.wave){
      // 에너지파: 방향으로 직진, 관통, 폭 내 모든 적에게 1회씩 피해
      p.x += p.dirx*p.speed*dt;
      p.y += p.diry*p.speed*dt;
      p.life -= dt;
      const w2 = (p.width*0.5)*(p.width*0.5);
      for(const e of sim.enemies){
        if(p.hitIds[e.id]) continue;
        const dx=e.px-p.x, dy=e.py-p.y;
        if(dx*dx+dy*dy <= w2){
          e.hp -= Math.max(1, p.dmg - (e.armor||0));
          p.hitIds[e.id] = 1;
        }
      }
      if(p.life<=0) p.dead=true;
      continue;
    }
    const target = sim.enemies.find(e=>e.id===p.targetId);
    if(!target){ p.dead=true; continue; }
    const dx=target.px-p.x, dy=target.py-p.y;
    const dist=Math.hypot(dx,dy);
    const step=p.speed*dt;
    if(dist<=step){ applyHit(p,target); p.dead=true; }
    else { p.x += dx/dist*step; p.y += dy/dist*step; }
  }
  sim.projectiles = sim.projectiles.filter(p=>!p.dead);

  if(sim.waveActive && sim.spawnQueue.length===0 && sim.enemies.length===0){
    sim.waveActive = false;
    const bonus = Math.round((22 + sim.wave*8) * (1 + waveTier(sim.wave)*0.4));
    addGoldBoth(bonus);   // 웨이브 격퇴 보너스는 양쪽 각자 전액
    // 은행탑 수입: 각 은행 설치자에게 income*level 지급
    for(const t of sim.towers){ if(t.type==='bank') addGold(t.owner||'host', TOWER_TYPES.bank.income * t.level); }
    // 각성자 강등: 마지막 업그레이드 후 decayWaves 웨이브 경과 시 -1레벨 (최소 1)
    let decayed = false;
    for(const t of sim.towers){
      const def = TOWER_TYPES[t.type];
      if(!def.infinite) continue;
      if(t.level>1 && (sim.wave - (t.lastUpWave||0)) >= def.decayWaves){
        t.level--; t.lastUpWave = sim.wave; decayed = true;
      }
    }
    if(decayed) pushEvent({t:'decay'});
    pushEvent({t:'waveClear', wave:sim.wave, bonus});
    sim.waveTimer = PREP_TIME;
  }
}
function buildSnapshot(){
  return {
    gm: sim.golds,                // pid별 골드 맵 (게스트는 자기 것 조회)
    pl: sim.players,              // 플레이어 pid 목록
    rm: sim.ready,                // pid별 준비 상태
    l: sim.lives, w: sim.wave,
    ph: sim.phase, pt: Math.round(Math.max(0,sim.prepTimer)),
    wa: sim.waveActive?1:0, wt: Math.round(Math.max(0,sim.waveTimer)*10)/10,
    e: sim.enemies.map(e=>[e.id,e.type,Math.round(e.px),e.hp,e.maxHp,Math.round(e.py)]),
    t: sim.towers.map(t=>[t.id,Math.round(t.x),Math.round(t.y),t.type,t.level,t.owner,t.invested,Math.round((t.skillCd||0)*10)/10,Math.round(t.stored||0)]),
    wl: sim.walls.map(w=>[Math.round(w.x),Math.round(w.y),Math.round(w.hp),Math.round(w.maxHp),Math.round(w.life*10)/10]),
    lo: sim.loadout || loadout,
    p: sim.projectiles.map(p=>[Math.round(p.x),Math.round(p.y),p.type]),
    fz: sim.flameSkillT>0 ? 1 : 0,
    ft: sim.fireTrails.map(f=>[Math.round(f.x),Math.round(f.y),f.blue?1:0]),
    ev: sim.pendingEvents,
    sp: gameSpeed,
    sf: sim.sfxFire, sk: sim.sfxKill, sb: sim.sfxBaseHit,
    go: sim.gameOver?1:0
  };
}

/* ---------------- 게스트: 스냅샷 반영 ---------------- */
function onNetSync(data){
  const myGold = data.gm ? (data.gm[myPid]||0) : (data.g||0);
  const myReady = data.rm ? !!data.rm[myPid] : false;
  guestState = {gold:myGold, lives:data.l, wave:data.w, waveActive:!!data.wa, waveTimer:data.wt, gameOver:!!data.go,
    phase:data.ph||'battle', prepTimer:data.pt||0, myReady:myReady, fireActive:!!data.fz,
    golds:data.gm||{}, players:data.pl||[], readyMap:data.rm||{}};
  if(data.sp===1||data.sp===2||data.sp===3||data.sp===5){ gameSpeed = data.sp; updateSpeedBtn(); }

  const seen = new Set();
  for(const tup of data.e){
    const [id,type,x,hp,maxHp,py] = tup;
    seen.add(id);
    let en = guestEnemies[id];
    if(!en) guestEnemies[id] = {type, x, px:x, py:py, ry:py, hp, maxHp};
    else { en.x=x; en.px=x; en.py=py; en.hp=hp; en.maxHp=maxHp; en.type=type; }
  }
  for(const idStr of Object.keys(guestEnemies)){
    if(!seen.has(Number(idStr))) delete guestEnemies[idStr];
  }

  guestTowers = data.t.map(tup=>({id:tup[0], x:tup[1], y:tup[2], type:tup[3], level:tup[4], owner:tup[5], invested:tup[6], skillCd:tup[7]||0, stored:tup[8]||0}));
  guestWalls = (data.wl||[]).map(tup=>({x:tup[0], y:tup[1], hp:tup[2], maxHp:tup[3], life:tup[4]}));
  if(Array.isArray(data.lo) && data.lo.length){
    const changed = data.lo.length!==loadout.length || data.lo.some((x,i)=>x!==loadout[i]);
    if(changed) applyLoadout(data.lo);
  }
  for(const gid of Object.keys(ghosts)){
    const g = ghosts[gid];
    if(guestTowers.some(tw=>Math.abs(tw.x-g.x)<10 && Math.abs(tw.y-g.y)<10)) delete ghosts[gid];
  }
  guestProjectiles = data.p.map(tup=>({x:tup[0], y:tup[1], type:tup[2]}));
  guestFireTrails = (data.ft||[]).map(tup=>({x:tup[0], y:tup[1], blue:!!tup[2]}));

  // 게스트 전투 사운드 (집계 기반, 과하지 않게 소량만)
  if(soundReady){
    if(data.sf){
      let fired = 0;
      for(const k in data.sf){ if(data.sf[k]>0 && fired<3){ Snd.play('fire', k); fired++; } }
    }
    if(data.sk>0) Snd.play('kill');
    if(data.sb>0) Snd.play('baseHit');
  }

  if(data.ev && data.ev.length){ for(const evt of data.ev) showBanner(evt); }

  if(data.go && currentScreen==='game') triggerGameOver(data.w);
}
function tickGuestInterp(dt){
  const f = Math.min(1, dt/0.15);
  for(const id in guestEnemies){
    const e = guestEnemies[id];
    e.rx += (e.x - e.rx)*f;
    e.ry += (e.py - (e.ry!=null?e.ry:e.py))*f;
    if(e.ry==null) e.ry = e.py;
  }
}

function gold(){ return isHost ? (sim?(sim.golds[myPid]||0):0) : (guestState ? guestState.gold : 0); }
function lives(){ return isHost ? sim.lives : (guestState ? guestState.lives : 0); }

function prepTimerNow(){ return isHost ? (sim?sim.prepTimer:0) : (guestState ? guestState.prepTimer : 0); }
function iAmReady(){ if(isHost) return !!(sim && sim.ready[myPid]); return !!(guestState && guestState.myReady); }
function fireActiveNow(){ return isHost ? (sim&&sim.flameSkillT>0) : (guestState && guestState.fireActive); }
function getRenderTrails(){ return isHost ? (sim?sim.fireTrails:[]) : guestFireTrails; }

function playerIds(){ return isHost ? (sim?sim.players:[]) : (guestState?guestState.players:[]) || []; }
// pid → 표시 이름 (로스터 기준, 없으면 방장/플레이어N)
function pidName(pid){
  const r = roster.find(p=>p.pid===pid);
  if(r) return r.name + (r.host?' (방장)':'');
  if(pid==='host') return '방장';

}
// 4인 색상 팔레트 (설치자 구분용)
const PLAYER_COLORS = ['#4fc3d9','#e0574a','#7fd06a','#e8b13d'];
function pidColor(pid){
  const ids = playerIds();
  let i = ids.indexOf(pid);
  if(i<0) i = (pid==='host'?0:1);
  return PLAYER_COLORS[i % PLAYER_COLORS.length];
}
function getRenderEnemies(){
  if(isHost) return sim.enemies.map(e=>({type:e.type, px:e.px, py:e.py, x:e.x, hp:e.hp, maxHp:e.maxHp}));
  return Object.values(guestEnemies).map(e=>({type:e.type, px:e.rx, py:(e.ry!=null?e.ry:e.py), x:e.rx, hp:e.hp, maxHp:e.maxHp}));
}
function getRenderTowers(){ return isHost ? sim.towers : guestTowers; }
function getRenderProjectiles(){ return isHost ? sim.projectiles : guestProjectiles; }
function towerNear(wx,wy,radius){
  const r = radius||30;
  let best=null, bestD=r*r;
  for(const t of getRenderTowers()){
    const dx=t.x-wx, dy=t.y-wy, d=dx*dx+dy*dy;
    if(d<=bestD){ bestD=d; best=t; }
  }
  return best;
}

/* ---------------- 이벤트 배너 / 토스트 ---------------- */
let bannerTimer=null, typeIv=null;
function typewrite(el, text){
  el.textContent='';
  let i=0;
  clearInterval(typeIv);
  typeIv = setInterval(()=>{
    el.textContent = text.slice(0, ++i);
    if(i>=text.length) clearInterval(typeIv);
  }, 32);
}
function showBanner(evt){
  let title='', sub='';
  if(evt.t==='waveStart'){ title=(evt.boss?'⚠️ 보스 웨이브 ':'웨이브 ')+evt.wave; sub=evt.boss?'거대한 적이 몰려온다!':evt.count+'마리가 몰려온다'; if(soundReady) Snd.play('waveStart'); }
  else if(evt.t==='waveClear'){ title='웨이브 '+evt.wave+' 격퇴!'; sub='+'+evt.bonus+' 골드'; if(soundReady) Snd.play('waveClear'); }
  else if(evt.t==='battleStart'){ title='전투 시작!'; sub='첫 웨이브가 곧 몰려온다'; if(soundReady) Snd.play('waveStart'); }
  else if(evt.t==='skill'){ title='🔥 업화 각인'; sub='30초간 공격이 적을 불태우고 불길을 남긴다'; if(soundReady) Snd.play('fire','cannon'); }
  else if(evt.t==='wave'){ title='✦ 에너지파'; sub='관통하는 파동이 적을 꿰뚫는다'; if(soundReady) Snd.play('fire','mage'); }
  else if(evt.t==='decay'){ title='각성자 약화'; sub='업그레이드를 하지 않아 힘이 빠졌다'; if(soundReady) Snd.play('sell'); }
  else if(evt.t==='wallUp'){ title='🛡 성벽 소환'; sub='체력 '+evt.hp+'의 벽이 길을 막는다'; if(soundReady) Snd.play('place'); }
  else if(evt.t==='gameOver'){ title='기지 함락'; sub='웨이브 '+evt.wave+'에서 무너졌다'; if(soundReady){ Snd.stopBgm(); Snd.play('gameOver'); } }
  else return;
  typewrite(eventTxt, title);
  eventSub.textContent='';
  clearTimeout(bannerTimer);
  eventBanner.classList.add('show');
  setTimeout(()=>{ eventSub.textContent = sub; }, Math.min(title.length*32, 650)+80);

}

        if(next.length<=1){ toast('최소 1종은 남겨야 해요'); return; }

function applyLoadout(list){
  if(!Array.isArray(list) || !list.length) return;
  const clean = list.filter(x=>TOWER_TYPES[x]).slice(0, LOADOUT_MAX);
  if(!clean.length) return;
  loadout = clean;
  if(selectedTowerType && !loadout.includes(selectedTowerType)){ selectedTowerType=null; placePreview=null; rangeShow=null; }
  buildTowerBar();
  refreshTowerBarSel();
  if(loadoutEditOpen) renderLoadoutDrawer();
}

/* ---------------- 렌더링 ---------------- */
function resizeCanvas(){
  dpr = Math.min(window.devicePixelRatio||1, 2.5);
  canvas.width = Math.round(innerWidth*dpr);
  canvas.height = Math.round(innerHeight*dpr);
  canvas.style.width = innerWidth+'px';
  canvas.style.height = innerHeight+'px';
  SCALE = innerHeight / WORLD_H;
  clampCamera();
}
function clampCamera(){
  const maxX = Math.max(0, WORLD_W - innerWidth/SCALE);
  camera.x = Math.min(Math.max(camera.x,0), maxX);
}
function worldToScreen(wx,wy){ return [(wx-camera.x)*SCALE, wy*SCALE]; }
function screenToWorld(sx,sy){ return [sx/SCALE+camera.x, sy/SCALE]; }

function draw(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const g = ctx.createLinearGradient(0,0,0,innerHeight);
  g.addColorStop(0,'#8fd3f0'); g.addColorStop(0.55,'#bfe6c4'); g.addColorStop(1,'#7cb85f');
  ctx.fillStyle=g; ctx.fillRect(0,0,innerWidth,innerHeight);

  ctx.save();
  ctx.setTransform(SCALE*dpr,0,0,SCALE*dpr, -camera.x*SCALE*dpr, 0);
  drawHills();
  drawLane();
  drawBaseAndSpawn();
  drawBuildZones();
  drawRangeAndPreview();
  drawTowers();
  drawFireZone();
  drawWalls();
  drawEnemies();
  drawProjectiles();
  ctx.restore();
}
function drawWalls(){
  const walls = getRenderWalls();
  if(!walls || !walls.length) return;
  const fwd = TOWER_TYPES.fortress;
  const R = fwd.wallR;
  for(const w of walls){
    const pct = w.maxHp>0 ? Math.max(0,Math.min(1, w.hp/w.maxHp)) : 0;
    // 돌벽 블록 (경로를 가로지르는 사각)
    ctx.fillStyle='#565d6c';
    ctx.fillRect(w.x-R, w.y-R-2, R*2, R*2+4);
    ctx.fillStyle='#9aa3b2';
    ctx.fillRect(w.x-R+3, w.y-R+1, R*2-6, R*2-2);
    // 흉벽 톱니
    ctx.fillStyle='#565d6c';
    for(let i=-R; i<R-2; i+=11){ ctx.fillRect(w.x+i, w.y-R-6, 7, 6); }
    // 벽돌 이음선
    ctx.strokeStyle='rgba(0,0,0,.28)'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(w.x-R+3, w.y); ctx.lineTo(w.x+R-3, w.y);
    ctx.moveTo(w.x-6, w.y-R+1); ctx.lineTo(w.x-6, w.y);
    ctx.moveTo(w.x+8, w.y); ctx.lineTo(w.x+8, w.y+R);
    ctx.stroke();
    // 체력바
    const bw=R*2;
    ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(w.x-bw/2, w.y-R-14, bw, 5);
    ctx.fillStyle = pct>0.4 ? '#7fd06a' : '#e0574a';
    ctx.fillRect(w.x-bw/2, w.y-R-14, bw*pct, 5);
    ctx.fillStyle='#fff'; ctx.font='900 10px "Black Han Sans",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(Math.round(w.hp), w.x, w.y+2);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }
}
function drawFireZone(){
  // 불타는 적이 남긴 불길 트레일을 렌더 (호스트/게스트 공용)
  const trails = getRenderTrails();
  if(!trails || !trails.length) return;
  const t = performance.now()/120;
  for(const ft of trails){
    const h = 18 + Math.sin(ft.x*0.07 + t)*8 + Math.random()*5;

    if(ft.blue){
      grd.addColorStop(0, 'rgba(180,230,255,0)');

      grd.addColorStop(1, 'rgba(30,80,220,0.7)');

      grd.addColorStop(0, 'rgba(255,220,80,0)');
      grd.addColorStop(0.4, 'rgba(255,150,40,0.55)');
      grd.addColorStop(1, 'rgba(210,50,20,0.7)');
    }
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(ft.x-11, ft.y+14);
    ctx.quadraticCurveTo(ft.x, ft.y-h, ft.x+11, ft.y+14);
    ctx.closePath(); ctx.fill();
  }
}
function drawHills(){

function drawLane(){
  // 잔디 벌판 전체
  ctx.fillStyle='#79bd58';

  const ROAD = LANE_NOBUILD*0.86;   // 길 반폭

  strokePath();
  ctx.strokeStyle='#c9a86b'; ctx.lineWidth=ROAD*2;      // 흙
  strokePath();
  ctx.strokeStyle='#b8965a'; ctx.lineWidth=ROAD*2*0.5;  // 중앙 짙은 흙
  ctx.globalAlpha=0.5; strokePath(); ctx.globalAlpha=1;
  // 자갈 점묘
  ctx.fillStyle='rgba(120,90,50,.30)';
  let acc=0;
  for(const s of PATH_SEGS.segs){
    for(let d=0; d<s.len; d+=46){

}
function strokePath(){
  ctx.beginPath();
  ctx.moveTo(PATH[0].x, PATH[0].y);
  for(let i=1;i<PATH.length;i++) ctx.lineTo(PATH[i].x, PATH[i].y);
  ctx.stroke();
}
function drawBaseAndSpawn(){
  const t = performance.now()/1000;

  /* ---- 거점: 파랗게 빛나는 무지개 그라데이션 구슬 (HP 표시) ---- */
  const bx = BASE_X, by = BASE_Y, R = 42;
  const pulse = 1 + Math.sin(t*2)*0.05;
  // 바깥 광채
  const glow = ctx.createRadialGradient(bx, by, R*0.5, bx, by, R*2.4*pulse);
  glow.addColorStop(0, 'rgba(90,180,255,.55)');
  glow.addColorStop(1, 'rgba(90,180,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(bx, by, R*2.4*pulse, 0, Math.PI*2); ctx.fill();
  // 회전하는 무지개 링(코니컬 느낌을 세그먼트로 근사)
  const hueOff = (t*40)%360;
  ctx.save();
  ctx.beginPath(); ctx.arc(bx, by, R, 0, Math.PI*2); ctx.clip();
  const segs = 24;
  for(let i=0;i<segs;i++){
    const a0 = (i/segs)*Math.PI*2, a1 = ((i+1)/segs)*Math.PI*2;
    ctx.fillStyle = 'hsl('+((hueOff + i/segs*360)%360)+',85%,62%)';
    ctx.beginPath(); ctx.moveTo(bx,by);
    ctx.arc(bx, by, R+2, a0, a1); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  // 파란 유리 광택 오버레이
  const glass = ctx.createRadialGradient(bx-14, by-16, 4, bx, by, R);
  glass.addColorStop(0,'rgba(255,255,255,.85)');
  glass.addColorStop(0.35,'rgba(120,200,255,.35)');
  glass.addColorStop(1,'rgba(30,90,200,.5)');
  ctx.fillStyle = glass;
  ctx.beginPath(); ctx.arc(bx, by, R, 0, Math.PI*2); ctx.fill();
  // 테두리
  ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(bx, by, R, 0, Math.PI*2); ctx.stroke();
  // HP 텍스트
  ctx.fillStyle='#0b2a5a';
  ctx.font='900 26px "Black Han Sans", sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(String(Math.max(0,Math.round(lives()))), bx, by+1);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';

  /* ---- 스폰: 검은 안개가 피어오르는 구슬 ---- */
  const sx = SPAWN_X, sy = SPAWN_Y, SR = 34;
  for(let i=0;i<5;i++){
    const ph = t*0.7 + i*1.3;
    const fy = sy - 20 - ((ph*26)%80);
    const fr = 16 + (i%3)*7 + Math.sin(ph)*4;
    const alpha = 0.28 * (1 - ((ph*26)%80)/80);
    ctx.fillStyle = 'rgba(20,15,28,'+alpha.toFixed(3)+')';
    ctx.beginPath(); ctx.arc(sx + Math.sin(ph*1.7)*10, fy, fr, 0, Math.PI*2); ctx.fill();
  }
  const dark = ctx.createRadialGradient(sx, sy, 3, sx, sy, SR);
  dark.addColorStop(0,'#3a2f47');
  dark.addColorStop(0.6,'#1a1322');
  dark.addColorStop(1,'#050308');
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.arc(sx, sy, SR, 0, Math.PI*2); ctx.fill();
  // 보랏빛 균열 glow
  ctx.strokeStyle='rgba(150,60,200,'+(0.45+Math.sin(t*3)*0.2).toFixed(3)+')';
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(sx, sy, SR-2, 0, Math.PI*2); ctx.stroke();
}
function drawTowerShape(x,y,type,level,alpha){
  const d = TOWER_TYPES[type];
  ctx.globalAlpha = alpha;
  ctx.fillStyle = d.dark;
  ctx.beginPath(); ctx.arc(x,y+4,24,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = d.color;
  if(type==='archer'){ ctx.beginPath(); ctx.arc(x,y,18,0,Math.PI*2); ctx.fill(); }
  else if(type==='cannon'){ ctx.fillRect(x-17,y-17,34,34); }
  else if(type==='frost'){ ctx.save(); ctx.translate(x,y); ctx.rotate(Math.PI/4); ctx.fillRect(-15,-15,30,30); ctx.restore(); }
  else if(type==='mage'){ ctx.beginPath(); ctx.moveTo(x,y-19); ctx.lineTo(x-17,y+13); ctx.lineTo(x+17,y+13); ctx.closePath(); ctx.fill(); }
  else if(type==='flame'){
    // 물방울/불꽃 모양
    ctx.beginPath(); ctx.moveTo(x,y-20); ctx.quadraticCurveTo(x+18,y-2, x,y+16); ctx.quadraticCurveTo(x-18,y-2, x,y-20); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffd76a';
    ctx.beginPath(); ctx.arc(x,y+2,6,0,Math.PI*2); ctx.fill();
    if(level>=MAX_LEVEL){ // 5렙: 발광 링
      ctx.strokeStyle='rgba(255,140,50,'+(0.5+Math.sin(performance.now()/200)*0.3).toFixed(2)+')';
      ctx.lineWidth=3; ctx.beginPath(); ctx.arc(x,y,26,0,Math.PI*2); ctx.stroke();
    }
  }
  else if(type==='bank'){
    // 금고/집 모양
    ctx.fillRect(x-16,y-8,32,22);
    ctx.beginPath(); ctx.moveTo(x-18,y-8); ctx.lineTo(x,y-22); ctx.lineTo(x+18,y-8); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#8f7a1c'; ctx.font='900 15px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('$', x, y+4); ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }
  else if(type==='awaken'){
    // 빛나는 별
    const glow = 0.4 + Math.sin(performance.now()/250)*0.25;
    ctx.save();
    ctx.shadowColor='rgba(255,93,176,'+glow.toFixed(2)+')'; ctx.shadowBlur=14;
    drawStar(x, y, 5, 19, 8);
    ctx.restore();
    ctx.fillStyle='#ffd0ec';
    drawStar(x, y, 5, 9, 4);
  }
  else if(type==='fortress'){
    // 성채 타워: 원형 몸체 + 흉벽
    ctx.beginPath(); ctx.arc(x,y,17,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=d.dark;
    for(let i=-16;i<16;i+=11){ ctx.fillRect(x+i, y-22, 6, 7); }
    ctx.fillStyle='#c7ccd6';
    ctx.fillRect(x-4,y-6,8,14);
  }
  // 레벨 표시: 무한 타워는 숫자, 그 외는 점(최대 5)
  if(TOWER_TYPES[type].infinite){
    ctx.fillStyle=COL_GOLD; ctx.font='900 13px "Black Han Sans",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('★'+level, x, y-32);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  } else {
    const n = Math.min(level, MAX_LEVEL);
    const startX = x - (n-1)*5;
    for(let i=0;i<n;i++){
      ctx.fillStyle=COL_GOLD;
      ctx.beginPath(); ctx.arc(startX+i*10, y-30, 3.0, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}
function drawStar(cx, cy, spikes, outer, inner){
  let rot = -Math.PI/2, step = Math.PI/spikes;
  ctx.beginPath(); ctx.moveTo(cx+Math.cos(rot)*outer, cy+Math.sin(rot)*outer);
  for(let i=0;i<spikes;i++){
    rot+=step; ctx.lineTo(cx+Math.cos(rot)*inner, cy+Math.sin(rot)*inner);
    rot+=step; ctx.lineTo(cx+Math.cos(rot)*outer, cy+Math.sin(rot)*outer);
  }
  ctx.closePath(); ctx.fill();
}
function drawBuildZones(){
  if(!selectedTowerType && !bulkUpOpen) return;

function drawRangeAndPreview(){

function drawTowers(){

function drawEnemies(){
  const now = performance.now()/1000;
  for(const e of getRenderEnemies()){
    const def = ENEMY_TYPES[e.type];
    const r = def.r;
    const ex = (e.px!=null?e.px:e.x), ey = (e.py!=null?e.py:LANE_Y);
    // 치유형: 주변 회복 오라
    if(def.heal){
      ctx.fillStyle='rgba(199,125,255,'+(0.10+Math.sin(now*3)*0.05).toFixed(3)+')';
      ctx.beginPath(); ctx.arc(ex, ey, def.healR||100, 0, Math.PI*2); ctx.fill();
    }
    // 검은 안개 잔영
    ctx.fillStyle='rgba(20,15,28,.32)';
    ctx.beginPath(); ctx.arc(ex+r*0.7, ey, r*1.15, 0, Math.PI*2); ctx.fill();
    // 몸체
    ctx.fillStyle = def.color;
    ctx.beginPath(); ctx.arc(ex, ey, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.18)';
    ctx.beginPath(); ctx.arc(ex, ey+r*0.35, r*0.7, 0, Math.PI*2); ctx.fill();
    // 장갑형: 금속 테두리
    if(def.armor){
      ctx.strokeStyle='#cbd2e6'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(ex, ey, r-1, 0, Math.PI*2); ctx.stroke();
    }
    // 보스(brute): 왕관 표식
    if(e.type==='brute'){
      ctx.fillStyle=COL_GOLD;
      ctx.beginPath();
      ctx.moveTo(ex-10, ey-r-4); ctx.lineTo(ex-10, ey-r-14); ctx.lineTo(ex-4, ey-r-8);
      ctx.lineTo(ex, ey-r-16); ctx.lineTo(ex+4, ey-r-8); ctx.lineTo(ex+10, ey-r-14);
      ctx.lineTo(ex+10, ey-r-4); ctx.closePath(); ctx.fill();
    }
    // 체력바 (보스는 더 넓게)
    const w = e.type==='brute' ? 48 : 28;
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(ex-w/2, ey-r-11, w, 5);
    ctx.fillStyle=COL_CRIMSON;
    const pct = e.maxHp>0 ? Math.max(0,Math.min(1, e.hp/e.maxHp)) : 0;
    ctx.fillRect(ex-w/2, ey-r-11, w*pct, 5);

}
function drawProjectiles(){
  for(const p of getRenderProjectiles()){

      g.addColorStop(0, 'rgba(255,190,240,0.95)');

    ctx.beginPath(); ctx.arc(p.x, p.y, p.type==='ball'?6:4, 0, Math.PI*2); ctx.fill();
